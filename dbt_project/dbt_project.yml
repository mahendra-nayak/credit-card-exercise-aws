name: cc_transactions_lake
version: '1.0.0'
config-version: 2
profile: cc_transactions_lake
model-paths: ['models']
models:
  cc_transactions_lake:
    silver:
      +materialized: table
      silver_accounts:
        +materialized: external
        +file_format: parquet
        +location: 's3://credit-card-lake/data/silver/accounts/data.parquet'
      silver_transaction_codes:
        +materialized: external
        +file_format: parquet
        +location: 's3://credit-card-lake/data/silver/transaction_codes/data.parquet'
      silver_transactions:
        +materialized: external
        +file_format: parquet
    gold:
      +materialized: table
      gold_daily_summary:
        +materialized: external
        +file_format: parquet
        +location: 's3://credit-card-lake/data/gold/.tmp_daily_summary.parquet'
      gold_weekly_account_summary:
        +materialized: external
        +file_format: parquet
        +location: 's3://credit-card-lake/data/gold/.tmp_weekly_account_summary.parquet'
